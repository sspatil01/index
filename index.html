<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Birthday Surprise</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.container{
width:90%;
max-width:700px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
padding:30px;
border-radius:20px;
box-shadow:0 0 30px rgba(255,255,255,0.1);
}

h1{
text-align:center;
margin-bottom:25px;
}

input,textarea{
width:100%;
padding:12px;
margin-top:10px;
margin-bottom:20px;
border:none;
border-radius:10px;
font-size:16px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:30px;
font-size:18px;
cursor:pointer;
background:#ff4f81;
color:white;
}

#linkBox{
margin-top:20px;
word-break:break-all;
background:rgba(255,255,255,0.1);
padding:15px;
border-radius:10px;
display:none;
}

.copyBtn{
margin-top:10px;
background:#00c896;
}
</style>
</head>

<body>

<div class="container">

<h1>🎂 Birthday Surprise Creator 🎁</h1>

<input type="text" id="name" placeholder="Birthday Person Name">

<textarea id="message" rows="5"
placeholder="Write your birthday message"></textarea>

<button onclick="generateLink()">
✨ Generate Birthday Link
</button>

<div id="linkBox">
<div id="generatedLink"></div>

<button class="copyBtn" onclick="copyLink()">
📋 Copy Link
</button>
</div>

</div>

<script>

function generateLink(){

let name =
encodeURIComponent(
document.getElementById("name").value
);

let msg =
encodeURIComponent(
document.getElementById("message").value
);

let base =
window.location.origin +
window.location.pathname.replace("index.html","");

let link =
base +
"card.html?name=" +
name +
"&msg=" +
msg;

document.getElementById("generatedLink")
.innerHTML =
'<a href="'+link+'" target="_blank" style="color:#ffd700">'+
link+
'</a>';

document.getElementById("linkBox").style.display="block";
}

function copyLink(){

navigator.clipboard.writeText(
document.getElementById("generatedLink").innerText
);

alert("Link copied!");
}

</script>

</body>
</html>
